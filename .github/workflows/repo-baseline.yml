name: Repo Baseline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify repository baseline
        run: |
          test -f README.md
          test -f LICENSE
          test -f .gitignore
          test -f package.json
